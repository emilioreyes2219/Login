<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Panel Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            overflow-x: hidden;
            background-color: #f8f9fa;
        }
        #wrapper {
            display: flex;
            transition: all 0.3s ease;
        }
        #sidebar-wrapper {
            min-height: 100vh;
            width: 250px;
            background-color: #222222;
            transition: margin 0.3s ease;
        }
        #page-content-wrapper {
            min-width: 100vw;
            width: 100%;
        }
        #wrapper.toggled #sidebar-wrapper {
            margin-left: -250px;
        }
        @media (min-width: 768px) {
            #page-content-wrapper {
                min-width: 0;
                width: 100%;
            }
        }
        .nav-link-custom {
            color: #d6d6d6;
            transition: 0.2s;
        }
        .nav-link-custom:hover {
            color: #ffffff;
            background-color: #2f2f2f;
        }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem("usuario")) {
            window.location.href = "login.html";
        }
    </script>

    <div id="wrapper">
        <div id="sidebar-wrapper" class="border-end border-dark">
            <div class="sidebar-heading text-white p-4 fs-5 fw-bold border-bottom border-dark">
                <i class="bi bi-shield-lock-fill me-2"></i>Mi Sistema
            </div>
            
            <div class="list-group list-group-flush p-2">
                <a class="nav-link nav-link-custom p-3 rounded text-decoration-none d-flex justify-content-between align-items-center" 
                   data-bs-toggle="collapse" href="#menuUsuarios" role="button" aria-expanded="true" aria-controls="menuUsuarios">
                    <span><i class="bi bi-people-fill me-2"></i> Usuarios</span>
                    <i class="bi bi-chevron-down small"></i>
                </a>
                
                <div class="collapse show" id="menuUsuarios">
                    <div class="ps-4 py-1">
                        <a href="#" class="nav-link nav-link-custom p-2 rounded text-decoration-none d-block bg-secondary text-white">
                            <i class="bi bi-person-plus me-2"></i> Captura Alumnos
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-content-wrapper">
            
            <nav class="navbar navbar-expand navbar-light bg-white border-bottom px-4 py-2">
                <button class="btn btn-outline-dark btn-sm me-3" id="menu-toggle">
                    <i class="bi bi-list fs-5"></i>
                </button>
                
                <div class="ms-auto dropdown">
                    <a class="nav-link dropdown-toggle fw-medium text-dark d-flex align-items-center" href="#" role="button" id="dropdownUser" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle fs-5 me-2 text-secondary"></i>
                        <span id="nombre-usuario-nav">Cargando...</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="dropdownUser">
                        <li>
                            <button class="dropdown-item text-danger fw-medium" id="btn-salir">
                                <i class="bi bi-box-arrow-right me-2"></i>Salir del sistema
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 col-lg-6">
                        
                        <div class="card shadow-sm border-0 rounded-3 p-4 bg-white mt-3">
                            <h4 class="fw-bold text-dark mb-1"><i class="bi bi-person-lines-fill me-2 text-primary"></i>Captura de Alumnos</h4>
                            <p class="text-muted small mb-4">Ingresa la información requerida del estudiante.</p>
                            
                            <form id="form-captura" onsubmit="return false;">
                                <div class="mb-3">
                                    <label for="nombre-alumno" class="form-label fw-semibold small">Nombre Completo :</label>
                                    <input type="text" id="nombre-alumno" class="form-control" placeholder="Ej: Juan Pérez" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="correo-alumno" class="form-label fw-semibold small">Correo Electrónico :</label>
                                    <input type="email" id="correo-alumno" class="form-control" placeholder="alumno@correo.com" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label for="password-alumno" class="form-label fw-semibold small">Contraseña :</label>
                                    <input type="password" id="password-alumno" class="form-control" placeholder="Mínimo 8 caracteres, mayúscula, número y especial" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="ncontrol-alumno" class="form-label fw-semibold small">Número de Control :</label>
                                        <input type="text" id="ncontrol-alumno" class="form-control" placeholder="8 dígitos" maxlength="8" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="fecha-alumno" class="form-label fw-semibold small">Fecha de Nacimiento :</label>
                                        <input type="date" id="fecha-alumno" class="form-control" required>
                                    </div>
                                </div>
                                
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mt-3" style="background-color: #2f2f2f; border: none;">
                                    Validar y Registrar Alumno
                                </button>
                            </form>
                            
                            <div id="mensaje-sistema" class="mt-3 text-center fw-medium small"></div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalEdad" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalEdadLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-dark text-white border-0">
                    <h5 class="modal-title fw-bold" id="modalEdadLabel"><i class="bi bi-shield-check me-2 text-success"></i>Verificación de Edad</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <div id="icono-modal" class="mb-3"></div>
                    <h4 id="titulo-modal" class="fw-bold"></h4>
                    <p id="texto-modal" class="text-muted"></p>
                </div>
                <div class="modal-footer border-0 justify-content-center">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Entendido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/utileria.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
